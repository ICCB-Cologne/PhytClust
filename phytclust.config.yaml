# Plotting defaults
plot:
  width_scale: 2.5
  # Lower value = shorter figure; increase if labels overlap
  height_scale: 0.30
  # Node marker size
  marker_size: 40
  # Hide numbers on branches by default
  show_branch_lengths: false
  # Hide internal nodes' labels
  hide_internal_nodes: true

# Saving defaults
save:
  # CSV filename
  csv_name: "phytclust_results.csv"
  # Mark singletons as -1 in CSV (treat as outliers)
  outlier: true
