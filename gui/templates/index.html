<!DOCTYPE html>
<html>
<head>
    <title>Phytclust Web GUI - Prototype</title>
</head>
<body>
    <h1>Phytclust Web GUI - Prototype</h1>

    <form id="form">
        <input type="text" id="input" required>
        <button type="submit">Run Phytclust</button>
    </form>

    <pre id="result"></pre>
    <img id="plot" style="max-width: 100%; display: none;">

    <script>
        document.getElementById("form").onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch("/run-phytclust", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({newick_string: document.getElementById("input").value})
            });
            const data = await res.json();

            const plotImg = document.getElementById("plot");
            if (data.tree_plot) {
                plotImg.src = "data:image/png;base64," + data.tree_plot;
                plotImg.style.display = "block";
                delete data.tree_plot;
            }

            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
        };
    </script>
</body>
</html>
