<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>PhytClust Web GUI – Minimal Viewer</title>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.1/underscore-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="/static/phylotree.js"></script>
    <link rel="stylesheet" href="/static/phylotree.css">

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 30px;
            max-width: 1100px;
        }

        textarea {
            width: 100%;
            max-width: 800px;
            height: 120px;
            font-family: monospace;
        }

        button {
            padding: 6px 14px;
            margin-top: 8px;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            max-height: 250px;
            overflow: auto;
            font-size: 12px;
        }

        #tree-container {
            width: 800px;
            height: 600px;
            border: 1px solid #ddd;
            margin-top: 20px;
            overflow: hidden;
        }

        .row {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            margin-top: 20px;
        }

        .col {
            flex: 1;
            min-width: 0;
        }
    </style>
</head>

<body>
    <h1>PhytClust Web GUI (Minimal)</h1>

    <p>Paste a Newick tree and click <strong>Run PhytClust</strong>.</p>

    <form id="form">
        <textarea id="input" placeholder="Paste Newick here..."></textarea><br />
        <button type="submit">Run PhytClust</button>
    </form>

    <div class="row">
        <div class="col">
            <h2>Result JSON</h2>
            <pre id="result">(waiting for run...)</pre>
        </div>
        <div class="col">
            <h2>Tree Visualization</h2>
            <div id="tree-container" style="width:800px; height:600px;"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById("form");
        const input = document.getElementById("input");
        const resultEl = document.getElementById("result");
        const treeContainer = document.getElementById("tree-container");

        // A tiny test tree as default
        input.value = "(((A:5,B:3)C1:6,(C:3,D:7)D1:4)A13:22,(((E:7,F:13)E12:5,G:6)B23:10,H:60):35):0;";

        form.onsubmit = async (e) => {
            e.preventDefault();

            const newick = input.value.trim();
            if (!newick) {
                alert("Please paste a Newick tree.");
                return;
            }

            resultEl.textContent = "Running PhytClust...";

            try {
                const res = await fetch("/api/run", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        newick: newick,
                        mode: "global",
                        top_n: 1
                    })
                });

                const data = await res.json();
                resultEl.textContent = JSON.stringify(data, null, 2);

                if (data.newick && data.clusters && data.clusters.length > 0) {
                    drawTree(data.newick, data.clusters[0]);
                } else {
                    treeContainer.innerHTML = "(no clusters in response)";
                }
            } catch (err) {
                console.error(err);
                resultEl.textContent = "Error: " + err;
            }
        };

        function drawTree(newick, clusters) {
            treeContainer.innerHTML = "";

            const tree = new phylotree.phylotree(newick);

            tree.render({
                container: "#tree-container",
                "left-right-spacing": "fit-to-size",
                "top-bottom-spacing": "fit-to-size"
            });

            const svg = tree.display.show();

            // CORRECT: append DOM element returned by show()
            treeContainer.appendChild(svg);

            console.log("SVG inserted:", document.querySelector("#tree-container svg"));
        }



    </script>
</body>

</html>
