      <!-- MAIN CONTENT -->
      <div class="main-content">
        <!-- Tab Bar -->
        <div class="tab-bar">
          <button
            class="tab-btn active"
            data-tab="viewer"
            id="viewer-tab"
            type="button"
          >
            Clustering
          </button>
          <button
            class="tab-btn"
            data-tab="compare"
            id="compare-tab"
            type="button"
          >
            Compare
          </button>
          <button
            class="tab-btn"
            data-tab="viewer-optimal-k"
            id="viewer-optimal-k-tab"
            type="button"
          >
            Scores
          </button>
          <button class="tab-btn" data-tab="debug" id="debug-tab" type="button">
            JSON
          </button>
          <div class="tab-spacer"></div>

          <!-- Search -->
          <div class="search-box">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="node-search"
              placeholder="Search nodes..."
              autocomplete="off"
            />
          </div>

          <!-- Cluster selector -->
          <div class="cluster-selector" id="cluster-select-controls">
            <label for="cluster-select">Result:</label>
            <button
              id="cluster-prev"
              class="btn-icon"
              type="button"
              title="Previous k"
              style="width: 24px; height: 24px; font-size: 12px"
            >
              &#x25C0;
            </button>
            <select id="cluster-select"></select>
            <button
              id="cluster-next"
              class="btn-icon"
              type="button"
              title="Next k"
              style="width: 24px; height: 24px; font-size: 12px"
            >
              &#x25B6;
            </button>
            <span class="badge" id="cluster-select-label">1 / 1</span>
            <button
              id="cluster-view-toggle"
              class="btn-ghost"
              type="button"
              style="
                display: none;
                margin-left: 6px;
                font-size: 11px;
                padding: 2px 8px;
              "
            >
              Show all k
            </button>
            <button
              id="btn-edit-clusters"
              class="btn-secondary"
              type="button"
              style="display: none; margin-left: 6px; height: 28px"
            >
              Edit clusters
            </button>
          </div>
        </div>

        <!-- Tree Toolbar -->
        <div class="toolbar" id="tree-toolbar">
          <div class="toolbar-group">
            <label for="layout-mode">Layout</label>
            <select id="layout-mode">
              <option value="rectangular">Rectangular</option>
              <option value="cladogram">Cladogram</option>
              <option value="circular">Circular</option>
            </select>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <label for="palette-select">Palette</label>
            <select id="palette-select">
              <option value="default">Default</option>
              <option value="pastel">Pastel</option>
              <option value="vivid">Vivid</option>
              <option value="dark">Dark</option>
              <option value="custom">Custom&hellip;</option>
            </select>
            <span id="palette-preview" class="palette-preview"></span>
            <button
              id="btn-shuffle-colors"
              class="btn-icon"
              type="button"
              title="Randomize color order"
              style="width: 24px; height: 24px; font-size: 12px"
            >
              &#x1F500;
            </button>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <label for="color-mode">Color</label>
            <select id="color-mode">
              <option value="bars">Side bars</option>
              <option value="boxes">Boxes (MRCA)</option>
              <option value="nodes">Nodes</option>
            </select>
          </div>
          <div class="toolbar-divider"></div>
          <div class="branch-options-wrap">
            <button
              id="branch-options-toggle"
              class="btn-ghost"
              type="button"
              style="font-size: 11px; padding: 3px 10px"
              aria-expanded="false"
            >
              Show branch options
            </button>
            <div id="branch-options-panel" class="toolbar-collapsible">
              <div class="toolbar-divider"></div>
              <div class="toolbar-group">
                <label for="node-size">Leaf size</label>
                <input
                  type="number"
                  id="node-size"
                  min="1"
                  max="10"
                  step="0.5"
                  value="3.0"
                  style="width: 50px"
                />
              </div>
              <div class="toolbar-group">
                <label for="label-size">Label</label>
                <input
                  type="number"
                  id="label-size"
                  min="6"
                  max="36"
                  value="9"
                  style="width: 50px"
                />
              </div>
              <div class="toolbar-group">
                <label for="axis-font-size">Axis</label>
                <input
                  type="number"
                  id="axis-font-size"
                  min="6"
                  max="18"
                  value="10"
                  style="width: 50px"
                />
              </div>
              <div class="toolbar-group">
                <label for="branch-width">Branch</label>
                <input
                  type="number"
                  id="branch-width"
                  min="0.5"
                  max="6"
                  step="0.1"
                  value="1.2"
                  style="width: 56px"
                />
              </div>
              <div class="toolbar-group">
                <label for="branch-color">Branch color</label>
                <input
                  type="color"
                  id="branch-color"
                  value="#000000"
                  title="Set branch color"
                  style="width: 34px; height: 28px; padding: 2px"
                />
                <button
                  id="branch-color-reset"
                  class="btn-ghost"
                  type="button"
                  style="font-size: 11px; padding: 2px 8px"
                  title="Reset to default"
                >
                  Reset
                </button>
              </div>
              <div class="toolbar-divider"></div>
              <div class="toolbar-group">
                <div class="slider-control">
                  <span class="slider-label">W</span>
                  <input
                    type="range"
                    id="tree-width-scale"
                    min="0.1"
                    max="8.0"
                    step="0.1"
                    value="1.0"
                  />
                </div>
                <div class="slider-control">
                  <span class="slider-label">H</span>
                  <input
                    type="range"
                    id="tree-height-scale"
                    min="0.1"
                    max="8.0"
                    step="0.1"
                    value="1.0"
                  />
                </div>
              </div>
              <div class="toolbar-divider"></div>
              <label class="check-row"
                ><input type="checkbox" id="show-leaf-names" checked />
                Leaves</label
              >
              <label class="check-row"
                ><input type="checkbox" id="show-internal-names" />
                Internal</label
              >
              <label class="check-row"
                ><input type="checkbox" id="show-box-labels" checked /> Box
                labels</label
              >
              <label class="check-row"
                ><input type="checkbox" id="show-outlier-boxes" checked />
                Outlier boxes</label
              >
              <div class="toolbar-group">
                <label for="box-alpha">Box &alpha;</label>
                <input
                  type="range"
                  id="box-alpha"
                  min="0.02"
                  max="0.5"
                  step="0.02"
                  value="0.12"
                  style="width: 60px"
                />
              </div>
              <div class="toolbar-group">
                <label for="box-pad-v">Box pad V</label>
                <input
                  type="range"
                  id="box-pad-v"
                  min="0"
                  max="30"
                  step="1"
                  value="8"
                  style="width: 60px"
                />
              </div>
              <div class="toolbar-group">
                <label for="box-pad-h">Box pad H</label>
                <input
                  type="range"
                  id="box-pad-h"
                  min="0"
                  max="30"
                  step="1"
                  value="6"
                  style="width: 60px"
                />
              </div>
              <div class="toolbar-group">
                <label for="box-radius">Box radius</label>
                <input
                  type="range"
                  id="box-radius"
                  min="0"
                  max="20"
                  step="1"
                  value="6"
                  style="width: 60px"
                />
              </div>
            </div>
          </div>
          <div class="toolbar-divider"></div>
          <button
            id="btn-reset-view"
            class="btn-icon"
            type="button"
            title="Reset view"
          >
            &#x21BA;
          </button>
          <div
            class="copy-dropdown-wrap"
            style="position: relative; display: inline-block"
          >
            <button
              id="btn-copy-tree"
              class="btn-icon"
              type="button"
              title="Copy to clipboard"
            >
              &#x1F4CB;
            </button>
            <div class="copy-dropdown" id="copy-dropdown" style="display: none">
              <div class="copy-dropdown-title">Copy to clipboard</div>
              <button class="dropdown-item" data-copy-fmt="svg">
                SVG (vector)
              </button>
              <button class="dropdown-item" data-copy-fmt="png">PNG</button>
              <button class="dropdown-item" data-copy-fmt="jpg">JPG</button>
              <div class="copy-dropdown-quality">
                <label for="copy-dpi">DPI:</label>
                <input
                  type="number"
                  id="copy-dpi"
                  min="72"
                  max="1200"
                  value="300"
                  style="width: 60px; height: 24px; font-size: 11px"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Compare Toolbar -->
        <div class="toolbar" id="compare-toolbar" style="display: none">
          <div class="toolbar-group">
            <button id="compare-add-bar" class="btn-secondary" type="button">
              + Add comparison bar
            </button>
          </div>
          <span class="text-sm text-muted"
            >Add as many comparisons as needed. For file mode, upload a CSV/TSV
            with two columns: leaf_name and cluster_id.</span
          >
        </div>

        <div id="compare-config-list" class="compare-config-list"></div>

        <!-- Optimal k toolbar -->
        <div class="toolbar" id="optk-toolbar" style="display: none">
          <div class="toolbar-group">
            <label for="axis-mode">X-axis</label>
            <select id="axis-mode">
              <option value="log">Log scale</option>
              <option value="normal">Linear</option>
            </select>
          </div>
          <span class="text-sm text-muted">Scores shown for k &ge; 2</span>
          <div style="flex: 1"></div>
          <button
            id="btn-copy-maxk"
            class="btn-icon"
            type="button"
            title="Copy plot SVG"
          >
            &#x1F4CB;
          </button>
        </div>

        <!-- Visualization Panels -->
        <div class="viz-container">
          <div class="viz-panel active" id="viewer" role="tabpanel">
            <div id="tree_display"></div>
            <!-- Mini scores panel (bottom-right overlay on tree) -->
            <div class="mini-scores-panel" id="mini-scores-panel">
              <div class="mini-scores-header">
                <span>Scores</span>
                <button
                  id="mini-scores-toggle"
                  class="btn-icon"
                  type="button"
                  style="width: 20px; height: 20px; font-size: 10px"
                  title="Toggle"
                >
                  &#x25BC;
                </button>
              </div>
              <div class="mini-scores-body" id="mini-scores-body">
                <div id="mini-scores-plot"></div>
              </div>
            </div>
          </div>

          <div class="viz-panel" id="compare" role="tabpanel">
            <div class="compare-pane compare-single">
              <div class="compare-header" id="compare-left-label">
                Add comparison bars from k results or uploaded files.
              </div>
              <div class="compare-tree" id="compare-tree-left"></div>
            </div>
          </div>

          <div class="viz-panel" id="viewer-optimal-k" role="tabpanel">
            <div id="optimalk_plot"></div>
          </div>

          <div class="viz-panel json-panel" id="debug" role="tabpanel">
            <pre id="result">(waiting for run...)</pre>
          </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-message">Ready</span>
          <div style="flex: 1"></div>
          <span class="text-sm text-muted" id="leaf-count-label"></span>
        </div>
      </div>
